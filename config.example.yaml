# ATConnect Configuration
# Copy this file to config.yaml and adjust as needed.

server:
  # Address the server listens on
  listen_address: ":8080"

log:
  # Log level: debug, info, warn, error
  level: "info"
  # Log format: text (human-readable, dev), json (machine-parseable, prod)
  format: "text"

store:
  # Storage backend: memory, sqlite, postgres (future)
  backend: "memory"
  sqlite:
    # SQLite file path (used when backend=sqlite)
    path: "./data/atconnect.db"

oidc:
  # The public-facing URL of this OIDC provider
  issuer_url: "http://localhost:8080"
  # Enable OIDC provider endpoints (future)
  enabled: false

oauth:
  # OAuth scopes to request from ATProto authorization servers
  scopes:
    - "atproto"
